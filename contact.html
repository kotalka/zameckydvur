							<h3 class="mb-4">Kontaktujte Nás</h3>
							<div id="form-message-warning" class="mb-4"></div>
							<div id="form-message-success" class="mb-4">
								Zašlete zprávu, vyplněním níže. Děkujeme!
							</div>
							<form method="POST" id="contactForm" name="contactForm" class="contactForm">
								<div class="row">
									<div class="col-md-6">
										<div class="form-group">
											<label class="label" for="name">Celé jméno</label>
											<input type="text" class="form-control" name="name" id="name"
												placeholder="Jméno a Příjmení">
										</div>
									</div>
									<div class="col-md-6">
										<div class="form-group">
											<label class="label" for="email">E-mail</label>
											<input type="email" class="form-control" name="email" id="email"
												placeholder="E-mail">
										</div>
									</div>
									<div class="col-md-12">
										<div class="form-group">
											<label class="label" for="subject">Předmět</label>
											<input type="text" class="form-control" name="subject" id="subject"
												placeholder="Předmět">
										</div>
									</div>
									<div class="col-md-12">
										<div class="form-group">
											<label class="label" for="#">Zpráva</label>
											<textarea name="message" class="form-control" id="message" cols="30"
												rows="4" placeholder="Zpráva"></textarea>
										</div>
									</div>
									<div class="col-md-12">
										<div class="form-group">
											<input type="submit" value="Poslat Zprávu" class="btn btn-primary">
											<div class="submitting"></div>
										</div>
									</div>
								</div>
							</form>
						</div>
					</div>
